---
name: Build riscv64 wheel

"on":
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Upstream release tag to build from'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * 0'

jobs:
  build:
    runs-on: [self-hosted, linux, riscv64]
    timeout-minutes: 180
    outputs:
      python_version: ${{ steps.python_info.outputs.python_version }}
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}
          fetch-depth: 0

      - name: Set up Python
        run: |
          python3 -m venv /tmp/build-venv
          . /tmp/build-venv/bin/activate
          pip install --upgrade pip maturin

      - name: Build wheel
        run: |
          . /tmp/build-venv/bin/activate
          maturin build --release --out /tmp/wheels/ --manifest-path Cargo.toml

      - name: Verify platform tag
        run: |
          ls /tmp/wheels/*.whl
          for whl in /tmp/wheels/*.whl; do
            if echo "$whl" | grep -q "linux_riscv64\|manylinux.*riscv64"; then
              echo "OK: $whl"
            else
              echo "FAIL: $whl does not have riscv64 platform tag"
              exit 1
            fi
          done

      - name: Capture Python version
        id: python_info
        run: echo "python_version=$(python3 --version 2>&1)" >> "$GITHUB_OUTPUT"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/*.whl
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/build-venv /tmp/wheels

  release:
    needs: build
    runs-on: ubuntu-latest
    if: success()
    env:
      GH_REPO: ${{ github.repository }}
      PYTHON_VERSION: ${{ needs.build.outputs.python_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: wheel-riscv64
          path: /tmp/wheels/

      - name: Get wheel info
        id: wheel_info
        run: |
          WHL=$(ls /tmp/wheels/*.whl | head -1)
          BASENAME=$(basename "$WHL")
          VERSION=$(echo "$BASENAME" | sed 's/^[^-]*-\([^-]*\)-.*/\1/')
          echo "whl_path=$WHL" >> "$GITHUB_OUTPUT"
          echo "whl_name=$BASENAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate checksums
        run: |
          cd /tmp/wheels
          sha256sum *.whl > SHA256SUMS

      - name: Write release notes
        env:
          PYTHON_VERSION: ${{ needs.build.outputs.python_version }}
          WHL_NAME: ${{ steps.wheel_info.outputs.whl_name }}
          VERSION: ${{ steps.wheel_info.outputs.version }}
        run: |
          TAG="riscv64-v${VERSION}"
          {
            echo "Prebuilt riscv64 wheel for Linux."
            echo ""
            echo "Built on: BananaPi F3 (SpacemiT K1, rv64imafdcv)"
            echo "Python: ${PYTHON_VERSION}"
            echo "Wheel: ${WHL_NAME}"
            echo ""
            echo "Install:"
            echo '```'
            BASE_URL="https://github.com/gounthar/watchfiles/releases/download"
            echo "pip install watchfiles --find-links ${BASE_URL}/${TAG}/"
            echo '```'
          } > /tmp/release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WHL_NAME: ${{ steps.wheel_info.outputs.whl_name }}
          VERSION: ${{ steps.wheel_info.outputs.version }}
        run: |
          TAG="riscv64-v${VERSION}"
          TITLE="riscv64 wheel v${VERSION}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            /tmp/wheels/*.whl \
            /tmp/wheels/SHA256SUMS

      - name: Cleanup
        if: always()
        run: rm -rf /tmp/wheels /tmp/release-notes.md

  notify-index:
    needs: release
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Trigger index update
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh api repos/gounthar/riscv64-python-wheels/dispatches \
            -f event_type=fork-release-published \
            -f "client_payload[repo]=${REPO}" \
            -f "client_payload[tag]=${TAG}"
